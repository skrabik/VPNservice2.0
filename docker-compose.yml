services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpnservice_app
    restart: unless-stopped
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: vpnservice
      DB_USERNAME: vpnservice_user
      DB_PASSWORD: vpnservice_password
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - ./:/var/www/html
      - composer_cache:/tmp/composer

  postgres:
    image: postgres:latest
    container_name: vpnservice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpnservice
      POSTGRES_USER: vpnservice_user
      POSTGRES_PASSWORD: vpnservice_password
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  composer_cache:
  postgres_data:
