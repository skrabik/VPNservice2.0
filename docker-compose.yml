services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpnservice_app
    restart: unless-stopped
    working_dir: /var/www/
    env_file:
      - .env
    environment:
      PUBLIC_SHARE_PATH: /srv/public
    volumes:
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - public_data:/srv/public
    networks:
      - vpnservice_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "php-fpm", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: vpnservice_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:${NGINX_PORT:-8080}:80"
    volumes:
      - public_data:/var/www/public:ro
      - ./docker/nginx/conf.prod.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - vpnservice_network

  postgres:
    image: postgres:16
    container_name: vpnservice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vpnservice}
      POSTGRES_USER: ${DB_USERNAME:-vpnservice_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vpnservice_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vpnservice_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-vpnservice_user} -d ${DB_DATABASE:-vpnservice}" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  public_data:
    driver: local
  postgres_data:
    driver: local

networks:
  vpnservice_network:
    driver: bridge
