services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpnservice_app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: vpnservice
      DB_USERNAME: vpnservice_user
      DB_PASSWORD: vpnservice_password
    networks:
      - vpnservice_network
    depends_on:
      - postgres
    healthcheck:
      test: [ "CMD", "php-fpm", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16
    container_name: vpnservice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpnservice
      POSTGRES_USER: vpnservice_user
      POSTGRES_PASSWORD: vpnservice_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vpnservice_network

volumes:
  postgres_data:
    driver: local

networks:
  vpnservice_network:
    driver: bridge
